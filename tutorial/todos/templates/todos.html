{% extends 'base.html' %}

{% block title %}Todos{% endblock %}

{% block content %}

<ul>
    {% for todo in todos %}
        <li><b>{{ todo.id }} - {{ todo.title }}:</b> (Done: {{ todo.completed }}) (Owned by: {{ todo.owner }})</li>
    {% endfor %}
</ul>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Post</button>
</form>

{% endblock %}
